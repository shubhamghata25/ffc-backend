services:
  - type: web
    name: ffc-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: PRODUCTS_SHEET_URL
        sync: false
      - key: OFFER_SHEET_URL
        sync: false
      - key: GOOGLE_SHEET_WEBHOOK
        sync: false
      - key: FRONTEND_URL
        sync: false
